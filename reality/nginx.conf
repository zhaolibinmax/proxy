user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}

stream {

    upstream xray {
        server 127.0.0.1:10000;
        server [::1]:10000;
    }

    upstream vpn {
        server 127.0.0.1:5555;
        server [::1]:5555;
    }

    upstream web {
        server 127.0.0.1:8443;
        server [::1]:8443;
    }

    upstream block {
        server 127.0.0.1:1;
        server [::1]:1;
    }

    map $ssl_preread_server_name $backend {
        "" block;
        # www.pixiv.co.jp或admission.universityofcalifornia.edu
        admission.universityofcalifornia.edu xray;
        v.la.zhaolibin.cloud vpn;
        la.zhaolibin.cloud web;
        default block;
    }

    server {
        listen 443;
        listen [::]:443;
        ssl_preread on;
        proxy_pass $backend;
    }
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    gzip  on;

    include /etc/nginx/conf.d/*.conf;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;
    ssl_buffer_size 4k;
    ssl_protocols TLSv1.3;
    ssl_certificate /etc/letsencrypt/live/la.zhaolibin.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/la.zhaolibin.cloud/privkey.pem;
    ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
    ssl_conf_command Options PrioritizeChaCha;
    ssl_ecdh_curve auto;
    tcp_nopush on;
    tcp_nodelay on;
    resolver 1.1.1.1 8.8.8.8 [2606:4700:4700::1111] valid=300s;
    resolver_timeout 5s;
    server {
        listen 127.0.0.1:8443 ssl;
        listen [::1]:8443 ssl;
        listen 443 quic reuseport;
        listen [::]:443 quic reuseport;
        http2 on;
        http3 on;
        quic_gso on;
        server_name la.zhaolibin.cloud;
        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        location / {
            root /var/www/html/3kh0-lite-main;
            index index.html;
        }
        location /download/ {
            alias /download/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }
    }
    server {
        listen 80;
        listen [::]:80;
        server_name la.zhaolibin.cloud v.la.zhaolibin.cloud;
        location ~ /.well-known/acme-challenge {
            allow all;
            root /usr/share/nginx/html;
        }
    location / {
        return 301 https://$host$request_uri;
        }
    }
}
